<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1e3a5f">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://*.google.com https://*.googleusercontent.com; connect-src https://*.google.com https://*.googleusercontent.com; img-src 'self' data:;">
<title>Diet + Workout Planner</title>
<link rel="manifest" href="./manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif;background:#f2f2f7;-webkit-font-smoothing:antialiased;font-size:16px}
input,select,button{font-family:inherit;font-size:16px}
input[type=range]{-webkit-appearance:none;height:8px;border-radius:4px;background:#e2e8f0;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:#7c3aed;cursor:pointer}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
"use strict";
var h=React.createElement,useState=React.useState,useEffect=React.useEffect,useCallback=React.useCallback;

/* ===== CONSTANTS ===== */
var SLOTS=["cf","bf","ms","lu","lp","cf2","es","dn","dp"];
var SLOT_META={
  cf:{label:"Coffee",icon:"\u2615",time:"7:30 AM"},
  bf:{label:"Breakfast",icon:"\uD83C\uDF73",time:"7:30 AM"},
  ms:{label:"Mid Snack",icon:"\uD83E\uDD5C",time:"10:30 AM"},
  lu:{label:"Lunch",icon:"\uD83C\uDF5B",time:"1:00 PM"},
  lp:{label:"Lunch Protein",icon:"\uD83C\uDF57",time:"with lunch"},
  cf2:{label:"Afternoon Coffee",icon:"\u2615",time:"3:00-4:00 PM"},
  es:{label:"Eve Snack",icon:"\uD83E\uDED6",time:"4:30 PM"},
  dn:{label:"Dinner",icon:"\uD83E\uDD57",time:"7:30 PM"},
  dp:{label:"Dinner Protein",icon:"\uD83C\uDF57",time:"with dinner"}
};
var DAY_LABELS=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
var SKIP={id:"skip",name:"Skip / NA",desc:"Skipping this meal",cal:0,p:0,c:0,f:0,isSkip:true};
var SKIP_REASONS=["Not hungry","Nausea (Zepbound)","Fasting","Running late","Ate out","Other"];
var MENU_MAP={bf:"bf",coffee:["cf","cf2"],main:["lu","dn"],snack:["ms","es"],protein:["lp","dp"]};
var CACHE_VER="7";

/* ===== UTILITIES ===== */
var LS={
  get:function(k){try{return localStorage.getItem(k)}catch(e){return null}},
  set:function(k,v){try{localStorage.setItem(k,v)}catch(e){}},
  getSecure:function(k){try{var v=localStorage.getItem(k);if(!v)return null;return atob(v)}catch(e){return null}},
  setSecure:function(k,v){try{localStorage.setItem(k,btoa(v))}catch(e){}}
};

var CACHE={
  _d:{},
  set:function(k,v,isPast){this._d[k]={v:v,t:Date.now(),ttl:isPast?86400000:120000}},
  get:function(k){var e=this._d[k];if(!e)return null;if(Date.now()-e.t>e.ttl){delete this._d[k];return null}return e.v},
  clear:function(prefix){var self=this;Object.keys(self._d).forEach(function(k){if(k.indexOf(prefix)===0)delete self._d[k]})},
  has:function(k){return this.get(k)!==null}
};

var prefetchedWeek=null;
var prefetchInFlight=null;

function todayStr(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function dayOfWeek(ds){return new Date(ds+"T12:00:00").getDay()}
function addDays(ds,n){var d=new Date(ds+"T12:00:00");d.setDate(d.getDate()+n);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function getMonday(ds){var d=new Date(ds+"T12:00:00");var day=d.getDay();var diff=d.getDate()-day+(day===0?-6:1);d.setDate(diff);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}

function parseTime(v){
  if(!v)return"";
  var s=String(v);
  if(/^\d{1,2}:\d{2}\s*(AM|PM)$/i.test(s.trim()))return s.trim();
  if(s.indexOf("T")>-1&&s.indexOf(":")>-1){
    try{var d=new Date(s);var hr=d.getHours();var mn=d.getMinutes();var ap=hr>=12?"PM":"AM";hr=hr%12||12;return hr+":"+String(mn).padStart(2,"0")+" "+ap}catch(e){return s}
  }
  var num=parseFloat(s);
  if(!isNaN(num)&&num>0&&num<1){var tm=Math.round(num*24*60);var hh=Math.floor(tm/60);var mm=tm%60;var a=hh>=12?"PM":"AM";hh=hh%12||12;return hh+":"+String(mm).padStart(2,"0")+" "+a}
  return s;
}

function mapMenu(raw){
  var mapped={};
  Object.keys(raw).forEach(function(cat){
    var items=raw[cat];
    var targets=MENU_MAP[cat];
    if(!targets)return;
    if(Array.isArray(targets)){targets.forEach(function(t){mapped[t]=items})}
    else{mapped[targets]=items}
  });
  return mapped;
}

function makeFallback(m){
  return{id:m.foodId,name:m.foodName||"Unknown",desc:m.desc||"",cal:Number(m.cal)||0,p:Number(m.protein)||0,c:Number(m.carbs)||0,f:Number(m.fat)||0};
}

/* ===== MAIN APP ===== */
function App(){
  var s=useState;
  var screen_=s("loading"),screen=screen_[0],setScreen=screen_[1];
  var apiUrl_=s(""),apiUrl=apiUrl_[0],setApiUrl=apiUrl_[1];
  var apiKey_=s(""),apiKey=apiKey_[0],setApiKey=apiKey_[1];
  var menu_=s(null),menu=menu_[0],setMenu=menu_[1];
  var workouts_=s([]),workouts=workouts_[0],setWorkouts=workouts_[1];
  var settings_=s({}),settings=settings_[0],setSettings=settings_[1];
  var tab_=s("today"),tab=tab_[0],setTab=tab_[1];
  var selDate_=s(todayStr()),selDate=selDate_[0],setSelDate=selDate_[1];
  var dayMeals_=s({}),dayMeals=dayMeals_[0],setDayMeals=dayMeals_[1];
  var dayWorkout_=s(null),dayWorkout=dayWorkout_[0],setDayWorkout=dayWorkout_[1];
  var openSlot_=s(null),openSlot=openSlot_[0],setOpenSlot=openSlot_[1];
  var openWo_=s(false),openWo=openWo_[0],setOpenWo=openWo_[1];
  var skipModal_=s(null),skipModal=skipModal_[0],setSkipModal=skipModal_[1];
  var saving_=s(false),saving=saving_[0],setSaving=saving_[1];
  var msg_=s(""),msg=msg_[0],setMsg=msg_[1];
  var wf_=s({weight:"",waist:"",energy:"5",sleep:"5",nausea:"1",hunger:"5",mood:"5",water:"2.5",notes:""}),wf=wf_[0],setWf=wf_[1];
  var weightHist_=s([]),weightHist=weightHist_[0],setWeightHist=weightHist_[1];
  var weekData_=s([]),weekData=weekData_[0],setWeekData=weekData_[1];
  var loading_=s(false),loading=loading_[0],setLoading=loading_[1];
  var dayLoading_=s(false),dayLoading=dayLoading_[0],setDayLoading=dayLoading_[1];
  var err_=s(""),err=err_[0],setErr=err_[1];
  var step_=s(1),step=step_[0],setStep=step_[1];

  /* ----- Init ----- */
  useEffect(function(){
    var u=LS.get("dp_url");
    var k=LS.getSecure("dp_key");
    if(!k){var plain=LS.get("dp_key");if(plain&&plain.length>0){k=plain;LS.setSecure("dp_key",plain)}}
    if(u&&k){setApiUrl(u);setApiKey(k);setScreen("app")}
    else setScreen("setup");
  },[]);

  /* ----- API helpers ----- */
  var api=useCallback(function(action,params){
    params=params||{};
    var qs="";
    Object.keys(params).forEach(function(k){qs+="&"+k+"="+encodeURIComponent(params[k])});
    return fetch(apiUrl+"?action="+action+"&key="+encodeURIComponent(apiKey)+qs).then(function(r){return r.json()});
  },[apiUrl,apiKey]);

  var apiPost=useCallback(function(data){
    data.key=apiKey;
    return fetch(apiUrl,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(data)}).then(function(r){return r.json()});
  },[apiUrl,apiKey]);

  /* ----- Setup save ----- */
  function saveConfig(){
    if(!apiUrl.trim()||!apiKey.trim()){setErr("Both fields are required");return}
    var u=apiUrl.trim();
    if(u.indexOf("https://script.google.com/")!==0){setErr("URL must start with https://script.google.com/");return}
    if(u.indexOf("/exec")===-1){setErr("URL must end with /exec");return}
    var k=apiKey.trim();
    if(k.length<4){setErr("API key too short (min 4 chars)");return}
    setLoading(true);setErr("");
    fetch(u+"?action=getSettings&key="+encodeURIComponent(k))
    .then(function(r){return r.json()})
    .then(function(d){
      if(d.error){setErr("Connection failed: "+d.error);setLoading(false);return}
      LS.set("dp_url",u);LS.setSecure("dp_key",k);
      setApiUrl(u);setApiKey(k);setSettings(d.settings||{});setScreen("app");setLoading(false);
    })
    .catch(function(){setErr("Cannot connect. Check URL and try again.");setLoading(false)});
  }

  /* ----- Load menu/workouts/settings ----- */
  useEffect(function(){
    if(screen!=="app")return;
    setLoading(true);
    var cachedMenu=LS.get("dp_menu");
    var cachedWo=LS.get("dp_workouts");
    var cachedSettings=LS.get("dp_settings");
    var cacheAge=Number(LS.get("dp_cache_time"))||0;
    var cacheVer=LS.get("dp_cache_ver")||"0";
    var isFresh=Date.now()-cacheAge<3600000&&cacheVer===CACHE_VER;

    if(isFresh&&cachedMenu&&cachedWo&&cachedSettings){
      try{
        var pm=JSON.parse(cachedMenu);
        var pw=JSON.parse(cachedWo);
        var ps=JSON.parse(cachedSettings);
        if(pm&&(pm.cf||pm.bf||pm.lu)){
          setMenu(pm);setWorkouts(pw);setSettings(ps);setLoading(false);
          api("getMenu").then(function(m){if(m.menu){var mapped=mapMenu(m.menu);setMenu(mapped);LS.set("dp_menu",JSON.stringify(mapped))}}).catch(function(){});
          api("getWorkouts").then(function(w){if(w.workouts){setWorkouts(w.workouts);LS.set("dp_workouts",JSON.stringify(w.workouts))}}).catch(function(){});
          return;
        }
      }catch(ex){}
    }

    Promise.all([api("getMenu"),api("getWorkouts"),api("getSettings")])
    .then(function(res){
      var m=res[0],w=res[1],s2=res[2];
      if(m.menu){var mapped=mapMenu(m.menu);setMenu(mapped);LS.set("dp_menu",JSON.stringify(mapped))}
      if(w.workouts){setWorkouts(w.workouts);LS.set("dp_workouts",JSON.stringify(w.workouts))}
      if(s2.settings){setSettings(s2.settings);LS.set("dp_settings",JSON.stringify(s2.settings))}
      LS.set("dp_cache_time",String(Date.now()));
      LS.set("dp_cache_ver",CACHE_VER);
      setLoading(false);
    })
    .catch(function(){
      try{if(cachedMenu)setMenu(JSON.parse(cachedMenu));if(cachedWo)setWorkouts(JSON.parse(cachedWo));if(cachedSettings)setSettings(JSON.parse(cachedSettings))}catch(ex){}
      setLoading(false);
    });
  },[screen]);

  /* ----- Prefetch week ----- */
  var prefetchWeek=useCallback(function(dateInWeek){
    var mon=getMonday(dateInWeek);
    if(prefetchedWeek===mon)return Promise.resolve();
    if(prefetchInFlight)return prefetchInFlight;
    setDayLoading(true);
    var p=api("getWeekFull",{weekStart:mon}).then(function(r){
      if(r.success&&r.days){
        r.days.forEach(function(d){
          CACHE.set("day-"+d.date,{meals:d.meals||[],workout:d.workout||null},d.date<todayStr());
        });
        prefetchedWeek=mon;
      }
      setDayLoading(false);prefetchInFlight=null;
    }).catch(function(){setDayLoading(false);prefetchInFlight=null});
    prefetchInFlight=p;
    return p;
  },[api]);

  /* ----- Load day data ----- */
  function applyDayData(r){
    var meals={};
    if(r.meals)r.meals.forEach(function(m){
      if(String(m.skipped).toUpperCase()==="TRUE"){meals[m.slot]={id:"skip",name:"Skip / NA",desc:"Skipped",cal:0,p:0,c:0,f:0,isSkip:true,skipReason:m.skipReason};return}
      var sl=menu[m.slot]||[];
      var f=null;
      for(var i=0;i<sl.length;i++){if(sl[i].id===m.foodId){f=sl[i];break}}
      var item=f||makeFallback(m);
      if((m.slot==="lp"||m.slot==="dp")&&Number(item.cal)===0)item=Object.assign({},item,{isVeg:true});
      meals[m.slot]=item;
    });
    setDayMeals(meals);
    if(r.workout){
      var wf2=null;
      for(var i=0;i<workouts.length;i++){if(workouts[i].id===r.workout.id){wf2=workouts[i];break}}
      setDayWorkout(wf2||null);
    }else setDayWorkout(null);
  }

  useEffect(function(){
    if(!menu||screen!=="app")return;
    prefetchWeek(todayStr());
  },[menu,screen]);

  useEffect(function(){
    if(!menu||screen!=="app")return;
    var ck="day-"+selDate;
    var cached=CACHE.get(ck);
    if(cached){setDayLoading(false);applyDayData(cached);return}
    setDayLoading(true);
    var mon=getMonday(selDate);
    if(prefetchedWeek!==mon){
      prefetchWeek(selDate).then(function(){
        var c2=CACHE.get(ck);
        if(c2)applyDayData(c2);
        setDayLoading(false);
      });
    }else{
      api("getDayFull",{date:selDate}).then(function(r){
        if(r.success){CACHE.set(ck,r,selDate<todayStr());applyDayData(r)}
        setDayLoading(false);
      }).catch(function(){setDayLoading(false)});
    }
  },[selDate,menu,screen]);

  /* ----- Edge prefetch ----- */
  useEffect(function(){
    if(!menu||screen!=="app")return;
    var dow=dayOfWeek(selDate);
    if(dow===0||dow===6){
      var nm=addDays(getMonday(selDate),7);
      if(!CACHE.has("day-"+nm))api("getWeekFull",{weekStart:nm}).then(function(r){if(r.success&&r.days)r.days.forEach(function(d){CACHE.set("day-"+d.date,{meals:d.meals||[],workout:d.workout||null},d.date<todayStr())})}).catch(function(){});
    }
    if(dow===1){
      var pm2=addDays(getMonday(selDate),-7);
      if(!CACHE.has("day-"+pm2))api("getWeekFull",{weekStart:pm2}).then(function(r){if(r.success&&r.days)r.days.forEach(function(d){CACHE.set("day-"+d.date,{meals:d.meals||[],workout:d.workout||null},true)})}).catch(function(){});
    }
  },[selDate,menu,screen]);

  /* ----- Week tab ----- */
  useEffect(function(){
    if(tab!=="week"||screen!=="app")return;
    var mon=getMonday(selDate);
    var ck="week-"+mon;
    var cached=CACHE.get(ck);
    if(cached){setWeekData(cached);return}
    var allCached=true,results=[];
    for(var i=0;i<7;i++){
      var d=addDays(mon,i);
      var dc=CACHE.get("day-"+d);
      if(dc){
        var cal=0,p=0,c=0,f=0,sk=0;
        (dc.meals||[]).forEach(function(m){if(String(m.skipped).toUpperCase()==="TRUE")sk++;else{cal+=Number(m.cal)||0;p+=Number(m.protein)||0;c+=Number(m.carbs)||0;f+=Number(m.fat)||0}});
        results.push({date:d,day:DAY_LABELS[dayOfWeek(d)],cal:cal,p:p,c:c,f:f,skip:sk,burn:dc.workout?Number(dc.workout.burn)||0:0,woName:dc.workout?dc.workout.name:"--"});
      }else{allCached=false;break}
    }
    if(allCached){CACHE.set(ck,results,mon<getMonday(todayStr()));setWeekData(results);return}
    setLoading(true);
    api("getWeekFull",{weekStart:mon}).then(function(r){
      if(r.success&&r.days){
        r.days.forEach(function(d){CACHE.set("day-"+d.date,{meals:d.meals||[],workout:d.workout||null},d.date<todayStr())});
        var res=r.days.map(function(d){return{date:d.date,day:d.day,cal:d.totalCal,p:d.totalProtein,c:d.totalCarbs||0,f:d.totalFat||0,skip:d.skippedCount,burn:d.workoutBurn,woName:d.workout?d.workout.name:"--"}});
        CACHE.set(ck,res,mon<getMonday(todayStr()));setWeekData(res);
      }
      setLoading(false);
    }).catch(function(){setLoading(false)});
  },[tab,selDate,screen]);

  /* ----- Weight tab ----- */
  useEffect(function(){
    if(tab!=="weight"||screen!=="app")return;
    api("getWeightLog",{startDate:addDays(todayStr(),-90),endDate:todayStr()}).then(function(r){if(r.logs)setWeightHist(r.logs)}).catch(function(){});
  },[tab,screen]);

  /* ----- Actions ----- */
  function pickMeal(slot,item){
    setDayMeals(function(prev){var n=Object.assign({},prev);n[slot]=item;return n});
    setOpenSlot(null);
    if(item.isSkip&&slot!=="lp"&&slot!=="dp"&&slot!=="cf"&&slot!=="cf2")setSkipModal(slot);
  }
  function setSkipR(slot,reason){
    setDayMeals(function(prev){var n=Object.assign({},prev);n[slot]=Object.assign({},SKIP,{skipReason:reason});return n});
    setSkipModal(null);
  }
  function pickWorkout(w){setDayWorkout(w);setOpenWo(false)}

  function saveDay(){
    setSaving(true);setMsg("");
    var meals=SLOTS.filter(function(s2){return dayMeals[s2]}).map(function(s2){
      var m=dayMeals[s2];
      return{slot:s2,foodId:m.id||"skip",foodName:m.name,desc:m.desc||"",cal:m.cal||0,protein:m.p||0,carbs:m.c||0,fat:m.f||0,skipped:!!m.isSkip,skipReason:m.skipReason||""};
    });
    var payload={action:"logFullDay",date:selDate,meals:meals,workout:dayWorkout?{workoutId:dayWorkout.id,workoutName:dayWorkout.name,duration:dayWorkout.dur,burn:dayWorkout.burn,intensity:dayWorkout.intensity}:null};
    apiPost(payload).then(function(r){
      if(r.success){
        setMsg("Saved!");
        CACHE.clear("day-"+selDate);CACHE.clear("week-"+getMonday(selDate));
        prefetchedWeek=null;prefetchInFlight=null;
        prefetchWeek(selDate).then(function(){var fresh=CACHE.get("day-"+selDate);if(fresh)applyDayData(fresh)});
      }else{setMsg("Error: "+(r.error||"Unknown"))}
      setSaving(false);setTimeout(function(){setMsg("")},3000);
    }).catch(function(){setMsg("Save failed");setSaving(false);setTimeout(function(){setMsg("")},3000)});
  }

  function saveWeight(){
    setSaving(true);setMsg("");
    var data=Object.assign({action:"logWeight",date:todayStr()},wf);
    apiPost(data).then(function(r){
      if(r.success){setMsg("Weight logged!");api("getWeightLog",{startDate:addDays(todayStr(),-90),endDate:todayStr()}).then(function(r2){if(r2.logs)setWeightHist(r2.logs)})}
      else setMsg("Error: "+r.error);
      setSaving(false);setTimeout(function(){setMsg("")},3000);
    }).catch(function(){setMsg("Save failed");setSaving(false);setTimeout(function(){setMsg("")},3000)});
  }

  function logout(){LS.set("dp_url","");LS.setSecure("dp_key","");LS.set("dp_cache_time","0");setScreen("setup")}

  /* ----- Computed ----- */
  var totalCal=0,totalP=0,totalC=0,totalF=0;
  SLOTS.forEach(function(k){var m=dayMeals[k];if(m&&!m.isSkip){totalCal+=Number(m.cal)||0;totalP+=Number(m.p)||0;totalC+=Number(m.c)||0;totalF+=Number(m.f)||0}});
  var woBurn=dayWorkout?Number(dayWorkout.burn)||0:0;
  var calT=Number(settings.calorieTarget)||1600;
  var proT=Number(settings.proteinTarget)||110;
  var carbT=Number(settings.carbTarget)||165;
  var fatT=Number(settings.fatTarget)||50;
  var skCount=0;
  SLOTS.forEach(function(s2){if(s2!=="cf"&&s2!=="cf2"&&s2!=="lp"&&s2!=="dp"&&dayMeals[s2]&&dayMeals[s2].isSkip)skCount++});

  /* ========== SETUP SCREEN ========== */
  if(screen==="setup"){
    return h("div",{style:{background:"#f2f2f7",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
      h("div",{style:{maxWidth:420,width:"100%"}},
        h("div",{style:{background:"linear-gradient(135deg,#1e3a5f,#2d6a4f)",borderRadius:20,padding:28,color:"#fff",textAlign:"center",marginBottom:24}},
          h("div",{style:{fontSize:48}},"\uD83C\uDF7D\uFE0F"),
          h("h1",{style:{margin:"8px 0 0",fontSize:24,fontWeight:800}},"Diet + Workout Planner"),
          h("p",{style:{margin:"6px 0 0",fontSize:13,opacity:0.85}},"Connect to your Google Sheet")),
        h("div",{style:{background:"#fff",borderRadius:16,padding:24}},
          step===1?h("div",null,
            h("h3",{style:{margin:"0 0 6px",fontSize:18,fontWeight:700}},"Step 1: Web App URL"),
            h("p",{style:{margin:"0 0 16px",fontSize:14,color:"#64748b"}},"Paste your Google Apps Script URL"),
            h("input",{value:apiUrl,onChange:function(e){setApiUrl(e.target.value)},placeholder:"https://script.google.com/macros/s/.../exec",style:{width:"100%",padding:14,borderRadius:12,border:"1px solid #d1d5db",fontSize:15,marginBottom:14,boxSizing:"border-box"}}),
            h("button",{onClick:function(){if(apiUrl.trim()){setErr("");setStep(2)}else setErr("Enter URL first")},style:{width:"100%",padding:16,borderRadius:14,border:"none",background:"#1e3a5f",color:"#fff",fontSize:17,fontWeight:700,cursor:"pointer"}},"Next")):
          h("div",null,
            h("h3",{style:{margin:"0 0 6px",fontSize:18,fontWeight:700}},"Step 2: API Key"),
            h("p",{style:{margin:"0 0 16px",fontSize:14,color:"#64748b"}},"Enter your secret password"),
            h("input",{value:apiKey,onChange:function(e){setApiKey(e.target.value)},placeholder:"Your secret password",type:"password",style:{width:"100%",padding:14,borderRadius:12,border:"1px solid #d1d5db",fontSize:15,marginBottom:14,boxSizing:"border-box"}}),
