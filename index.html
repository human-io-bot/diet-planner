<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1e3a5f">
<title>Diet + Workout Planner</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231e3a5f'/><text y='68' x='50' text-anchor='middle' font-size='55'>🍽️</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif;background:#f2f2f7;-webkit-font-smoothing:antialiased;overflow-x:hidden}
input,select,button{font-family:inherit}
input[type=range]{-webkit-appearance:none;height:6px;border-radius:3px;background:#e2e8f0;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#7c3aed;cursor:pointer}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
.fade-in{animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const{useState,useEffect,useCallback,createElement:h}=React;

const SLOTS=["cf","bf","ms","lu","cf2","es","dn"];
const SLOT_META={cf:{label:"Coffee",icon:"\u2615",time:"7:30 AM"},bf:{label:"Breakfast",icon:"\u{1F373}",time:"7:30 AM"},ms:{label:"Mid Snack",icon:"\u{1F95C}",time:"10:30 AM"},lu:{label:"Lunch",icon:"\u{1F35B}",time:"1:00 PM"},cf2:{label:"Afternoon Coffee",icon:"\u2615",time:"3:00-4:00 PM"},es:{label:"Eve Snack",icon:"\u{1FAD6}",time:"4:30 PM"},dn:{label:"Dinner",icon:"\u{1F957}",time:"7:30 PM"}};
const COFFEE_OPTIONS=[
  {id:"cf1",name:"Black Coffee",desc:"Plain black coffee, no sugar",cal:5,p:0,c:0,f:0},
  {id:"cf2",name:"Black + Maple Syrup",desc:"Black coffee + 1 tsp organic maple syrup",cal:27,p:0,c:6,f:0},
  {id:"cf3",name:"Latte + Maple Syrup",desc:"Latte (low-fat milk) + 1 tsp maple syrup",cal:62,p:3,c:10,f:1},
  {id:"cf4",name:"Protein Latte",desc:"Collagen + PB protein + coffee + almond milk + maple syrup",cal:135,p:19,c:8,f:4},
  {id:"cf5",name:"Double Coffee",desc:"2 cups - 1 black + 1 latte + maple syrup",cal:89,p:3,c:16,f:1},
  {id:"cf6",name:"Iced Latte + Maple",desc:"Iced latte (low-fat milk) + 1 tsp maple syrup",cal:62,p:3,c:10,f:1},
];
const PM_COFFEE_OPTIONS=[
  {id:"pc1",name:"Black Coffee",desc:"Plain black coffee, no sugar",cal:5,p:0,c:0,f:0},
  {id:"pc2",name:"Black + Maple Syrup",desc:"Black coffee + 1 tsp organic maple syrup",cal:27,p:0,c:6,f:0},
  {id:"pc3",name:"Latte + Maple Syrup",desc:"Latte (low-fat milk) + 1 tsp maple syrup",cal:62,p:3,c:10,f:1},
  {id:"pc4",name:"Iced Latte + Maple",desc:"Iced latte (low-fat milk) + 1 tsp maple syrup",cal:62,p:3,c:10,f:1},
  {id:"pc5",name:"Iced Black + Maple",desc:"Iced black coffee + 1 tsp maple syrup",cal:27,p:0,c:6,f:0},
  {id:"pc6",name:"Green Tea",desc:"1 cup green tea (no sugar)",cal:2,p:0,c:0,f:0},
  {id:"pc7",name:"Masala Chai (light)",desc:"Masala chai with low-fat milk, no sugar",cal:35,p:2,c:4,f:1},
];
const DAY_LABELS=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const SKIP={id:"skip",name:"Skip / NA",desc:"Skipping this meal",cal:0,p:0,c:0,f:0,isSkip:true};
const SKIP_REASONS=["Not hungry","Nausea (Zepbound)","Fasting","Running late","Ate out","Other"];

const LS={get(k){try{return localStorage.getItem(k)}catch(e){return null}},set(k,v){try{localStorage.setItem(k,v)}catch(e){}}};

function todayStr(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}

function parseTime(v){
  if(!v)return"";
  const s=String(v);
  // Already formatted like "6:30 AM"
  if(/^\d{1,2}:\d{2}\s*(AM|PM)$/i.test(s.trim()))return s.trim();
  // Google Sheets date-time format like 1899-12-30T12:30:00.000Z
  // Use browser local time to auto-adjust timezone
  if(s.includes("T")&&s.includes(":")){
    try{
      const d=new Date(s);
      let h=d.getHours();
      let m=d.getMinutes();
      const ap=h>=12?"PM":"AM";
      h=h%12||12;
      return h+":"+String(m).padStart(2,"0")+" "+ap;
    }catch(e){return s}
  }
  // Plain number (hours as decimal from Sheets, e.g. 0.2708333 = 6:30 AM)
  const num=parseFloat(s);
  if(!isNaN(num)&&num>0&&num<1){
    const totalMin=Math.round(num*24*60);
    let h=Math.floor(totalMin/60);
    const m=totalMin%60;
    const ap=h>=12?"PM":"AM";
    h=h%12||12;
    return h+":"+String(m).padStart(2,"0")+" "+ap;
  }
  return s;
}
function dayOfWeek(ds){return new Date(ds+"T12:00:00").getDay()}
function addDays(ds,n){const d=new Date(ds+"T12:00:00");d.setDate(d.getDate()+n);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function getMonday(ds){const d=new Date(ds+"T12:00:00");const day=d.getDay();const diff=d.getDate()-day+(day===0?-6:1);d.setDate(diff);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}

function App(){
  const[screen,setScreen]=useState("loading");
  const[apiUrl,setApiUrl]=useState("");
  const[apiKey,setApiKey]=useState("");
  const[menu,setMenu]=useState(null);
  const[workouts,setWorkouts]=useState([]);
  const[settings,setSettings]=useState({});
  const[tab,setTab]=useState("today");
  const[selDate,setSelDate]=useState(todayStr());
  const[dayMeals,setDayMeals]=useState({});
  const[dayWorkout,setDayWorkout]=useState(null);
  const[openSlot,setOpenSlot]=useState(null);
  const[openWo,setOpenWo]=useState(false);
  const[skipModal,setSkipModal]=useState(null);
  const[skipReasons2,setSkipReasons2]=useState({});
  const[saving,setSaving]=useState(false);
  const[msg,setMsg]=useState("");
  const[wf,setWf]=useState({weight:"",waist:"",energy:"5",sleep:"5",nausea:"1",hunger:"5",mood:"5",water:"2.5",notes:""});
  const[weightHist,setWeightHist]=useState([]);
  const[weekData,setWeekData]=useState([]);
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState("");
  const[step,setStep]=useState(1);

  useEffect(()=>{
    const u=LS.get("dp_url"),k=LS.get("dp_key");
    if(u&&k){setApiUrl(u);setApiKey(k);setScreen("app")}
    else setScreen("setup");
  },[]);

  const saveConfig=async()=>{
    if(!apiUrl.trim()||!apiKey.trim()){setErr("Both fields are required");return}
    setLoading(true);setErr("");
    try{
      const r=await fetch(apiUrl.trim()+"?action=getSettings&key="+encodeURIComponent(apiKey.trim()));
      const d=await r.json();
      if(d.error){setErr("Connection failed: "+d.error);setLoading(false);return}
      LS.set("dp_url",apiUrl.trim());
      LS.set("dp_key",apiKey.trim());
      setSettings(d.settings||{});
      setScreen("app");
    }catch(e){setErr("Cannot connect. Check URL and try again.")}
    setLoading(false);
  };

  const api=useCallback(async(action,params={})=>{
    const qs=Object.entries(params).map(([k,v])=>"&"+k+"="+encodeURIComponent(v)).join("");
    const r=await fetch(apiUrl+"?action="+action+"&key="+encodeURIComponent(apiKey)+qs);
    return r.json();
  },[apiUrl,apiKey]);

  const apiPost=useCallback(async(data)=>{
    const r=await fetch(apiUrl,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({...data,key:apiKey})});
    return r.json();
  },[apiUrl,apiKey]);

  useEffect(()=>{
    if(screen!=="app")return;
    (async()=>{
      setLoading(true);
      try{
        const[m,w,s]=await Promise.all([api("getMenu"),api("getWorkouts"),api("getSettings")]);
        if(m.menu)setMenu(m.menu);
        if(w.workouts)setWorkouts(w.workouts);
        if(s.settings)setSettings(s.settings);
      }catch(e){}
      setLoading(false);
    })();
  },[screen]);

  useEffect(()=>{
    if(!menu||screen!=="app")return;
    (async()=>{
      try{
        const[ml,wl]=await Promise.all([api("getDailyLog",{date:selDate}),api("getWorkoutLog",{date:selDate})]);
        const meals={};
        if(ml.meals)ml.meals.forEach(m=>{
          if(m.skipped==="TRUE")meals[m.slot]={...SKIP,skipReason:m.skipReason};
          else if(m.slot==="cf"){const f=COFFEE_OPTIONS.find(x=>x.id===m.foodId);meals[m.slot]=f||{id:m.foodId,name:m.foodName,desc:m.desc,cal:Number(m.cal),p:Number(m.protein),c:Number(m.carbs),f:Number(m.fat)};}
          else if(m.slot==="cf2"){const f=PM_COFFEE_OPTIONS.find(x=>x.id===m.foodId);meals[m.slot]=f||{id:m.foodId,name:m.foodName,desc:m.desc,cal:Number(m.cal),p:Number(m.protein),c:Number(m.carbs),f:Number(m.fat)};}          else{const sl=menu[m.slot]||[];const f=sl.find(x=>x.id===m.foodId);meals[m.slot]=f||{id:m.foodId,name:m.foodName,desc:m.desc,cal:Number(m.cal),p:Number(m.protein),c:Number(m.carbs),f:Number(m.fat)};}
        });
        setDayMeals(meals);
        if(wl.workout){const f=workouts.find(x=>x.id===wl.workout.id);setDayWorkout(f||null)}else setDayWorkout(null);
      }catch(e){}
    })();
  },[selDate,menu,workouts,screen]);

  useEffect(()=>{
    if(tab!=="weight"||screen!=="app")return;
    (async()=>{try{const r=await api("getWeightLog",{startDate:addDays(todayStr(),-90),endDate:todayStr()});if(r.logs)setWeightHist(r.logs)}catch(e){}})();
  },[tab,screen]);

  useEffect(()=>{
    if(tab!=="week"||screen!=="app")return;
    (async()=>{
      setLoading(true);
      const mon=getMonday(selDate);const res=[];
      for(let i=0;i<7;i++){
        const d=addDays(mon,i);
        try{
          const[ml,wl]=await Promise.all([api("getDailyLog",{date:d}),api("getWorkoutLog",{date:d})]);
          let cal=0,p=0,sk=0;
          (ml.meals||[]).forEach(m=>{if(m.skipped==="TRUE")sk++;else{cal+=Number(m.cal)||0;p+=Number(m.protein)||0}});
          res.push({date:d,day:DAY_LABELS[dayOfWeek(d)],cal,p,skip:sk,burn:wl.workout?Number(wl.workout.burn)||0:0,woName:wl.workout?wl.workout.name:"--"});
        }catch(e){res.push({date:d,day:DAY_LABELS[dayOfWeek(d)],cal:0,p:0,skip:0,burn:0,woName:"--"})}
      }
      setWeekData(res);setLoading(false);
    })();
  },[tab,selDate,screen]);

  const pickMeal=(slot,item)=>{setDayMeals(p=>({...p,[slot]:item}));setOpenSlot(null);if(item.isSkip)setSkipModal(slot)};
  const setSkipR=(slot,reason)=>{setSkipReasons2(p=>({...p,[slot]:reason}));setDayMeals(p=>({...p,[slot]:{...SKIP,skipReason:reason}}));setSkipModal(null)};
  const pickWorkout=(w)=>{setDayWorkout(w);setOpenWo(false)};

  const saveDay=async()=>{
    setSaving(true);setMsg("");
    try{
      const meals=SLOTS.filter(s=>dayMeals[s]).map(s=>{const m=dayMeals[s];return{slot:s,foodId:m.id||"skip",foodName:m.name,desc:m.desc||"",cal:m.cal||0,protein:m.p||0,carbs:m.c||0,fat:m.f||0,skipped:!!m.isSkip,skipReason:m.skipReason||skipReasons2[s]||""}});
      const payload={action:"logFullDay",date:selDate,meals,workout:dayWorkout?{workoutId:dayWorkout.id,workoutName:dayWorkout.name,duration:dayWorkout.dur,burn:dayWorkout.burn,intensity:dayWorkout.intensity}:null};
      const r=await apiPost(payload);
      setMsg(r.success?"\u2705 Day saved!":"\u274C Error: "+(r.error||"Unknown"));
    }catch(e){setMsg("\u274C Save failed")}
    setSaving(false);setTimeout(()=>setMsg(""),3000);
  };

  const saveWeight=async()=>{
    setSaving(true);setMsg("");
    try{
      const r=await apiPost({action:"logWeight",date:todayStr(),...wf});
      if(r.success){setMsg("\u2705 Weight logged!");const wl=await api("getWeightLog",{startDate:addDays(todayStr(),-90),endDate:todayStr()});if(wl.logs)setWeightHist(wl.logs)}
      else setMsg("\u274C Error: "+r.error);
    }catch(e){setMsg("\u274C Save failed")}
    setSaving(false);setTimeout(()=>setMsg(""),3000);
  };

  const totalCal=SLOTS.reduce((s,k)=>{const m=dayMeals[k];return s+(m&&!m.isSkip?Number(m.cal)||0:0)},0);
  const totalP=SLOTS.reduce((s,k)=>{const m=dayMeals[k];return s+(m&&!m.isSkip?Number(m.p)||0:0)},0);
  const woBurn=dayWorkout?Number(dayWorkout.burn)||0:0;
  const calT=Number(settings.calorieTarget)||1600;
  const skCount=SLOTS.filter(s=>s!=="cf"&&s!=="cf2"&&dayMeals[s]&&dayMeals[s].isSkip).length;

  // ====== SETUP ======
  if(screen==="setup")return h("div",{style:{background:"#f2f2f7",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
    h("div",{style:{maxWidth:420,width:"100%"}},
      h("div",{style:{background:"linear-gradient(135deg,#1e3a5f,#2d6a4f)",borderRadius:20,padding:28,color:"#fff",textAlign:"center",marginBottom:24}},
        h("div",{style:{fontSize:48}},"\u{1F37D}\uFE0F"),
        h("h1",{style:{margin:"8px 0 0",fontSize:24,fontWeight:800}},"Diet + Workout Planner"),
        h("p",{style:{margin:"6px 0 0",fontSize:13,opacity:0.85}},"Connect to your Google Sheet")
      ),
      h("div",{style:{background:"#fff",borderRadius:16,padding:24}},
        step===1?h("div",null,
          h("h3",{style:{margin:"0 0 4px",fontSize:16,fontWeight:700}},"Step 1: Web App URL"),
          h("p",{style:{margin:"0 0 14px",fontSize:12,color:"#64748b"}},"Paste your Google Apps Script Web App URL"),
          h("input",{value:apiUrl,onChange:e=>setApiUrl(e.target.value),placeholder:"https://script.google.com/macros/s/.../exec",style:{width:"100%",padding:12,borderRadius:10,border:"1px solid #d1d5db",fontSize:13,marginBottom:12,boxSizing:"border-box"}}),
          h("button",{onClick:()=>{if(apiUrl.trim())setStep(2);else setErr("Enter URL first")},style:{width:"100%",padding:14,borderRadius:12,border:"none",background:"#1e3a5f",color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer"}},"Next")
        ):h("div",null,
          h("h3",{style:{margin:"0 0 4px",fontSize:16,fontWeight:700}},"Step 2: API Key"),
          h("p",{style:{margin:"0 0 14px",fontSize:12,color:"#64748b"}},"Enter your secret password"),
          h("input",{value:apiKey,onChange:e=>setApiKey(e.target.value),placeholder:"Your secret password",type:"password",style:{width:"100%",padding:12,borderRadius:10,border:"1px solid #d1d5db",fontSize:13,marginBottom:12,boxSizing:"border-box"}}),
          h("div",{style:{display:"flex",gap:8}},
            h("button",{onClick:()=>setStep(1),style:{flex:1,padding:14,borderRadius:12,border:"1px solid #d1d5db",background:"#fff",fontSize:14,fontWeight:600,cursor:"pointer"}},"Back"),
            h("button",{onClick:saveConfig,disabled:loading,style:{flex:2,padding:14,borderRadius:12,border:"none",background:loading?"#94a3b8":"#2d6a4f",color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer"}},loading?"Connecting...":"Connect")
          )
        ),
        err?h("div",{style:{marginTop:12,padding:10,borderRadius:8,background:"#fef2f2",color:"#dc2626",fontSize:12,fontWeight:600}},err):null
      )
    )
  );

  if(screen==="loading")return h("div",{style:{background:"#f2f2f7",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}},
    h("div",{style:{textAlign:"center"}},h("div",{style:{fontSize:48}},"\u{1F37D}\uFE0F"),h("p",{style:{color:"#64748b",marginTop:8}},"Loading..."))
  );

  // ====== MAIN APP ======
  const header=h("div",{style:{background:"linear-gradient(135deg,#1e3a5f,#2d6a4f)",padding:"18px 16px 14px",color:"#fff"}},
    h("div",{style:{maxWidth:600,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center"}},
      h("div",null,
        h("h1",{style:{margin:0,fontSize:18,fontWeight:800}},"\u{1F37D}\uFE0F Diet + Workout"),
        h("p",{style:{margin:"2px 0 0",fontSize:11,opacity:0.8}},"Target: "+calT+" kcal | Levo "+parseTime(settings.levoTime||"6:30 AM"))
      ),
      h("button",{onClick:()=>{LS.set("dp_url","");LS.set("dp_key","");setScreen("setup")},style:{background:"rgba(255,255,255,0.15)",border:"none",color:"#fff",padding:"6px 12px",borderRadius:8,fontSize:11,cursor:"pointer"}},"Logout")
    )
  );

  // Toast
  const toast=msg?h("div",{style:{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:msg.includes("\u274C")?"#dc2626":"#059669",color:"#fff",padding:"10px 24px",borderRadius:12,fontSize:14,fontWeight:700,zIndex:200}},msg):null;

  // Skip modal
  const skipM=skipModal?h("div",{style:{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.5)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:20},onClick:()=>{setSkipR(skipModal,"No reason")}},
    h("div",{onClick:e=>e.stopPropagation(),style:{background:"#fff",borderRadius:20,padding:24,maxWidth:340,width:"100%"}},
      h("h3",{style:{margin:"0 0 14px",fontSize:17,fontWeight:800,textAlign:"center"}},"Why skipping?"),
      ...SKIP_REASONS.map(r=>h("button",{key:r,onClick:()=>setSkipR(skipModal,r),style:{display:"block",width:"100%",padding:12,borderRadius:10,border:"1px solid #e5e5ea",background:"#f9f9fb",fontSize:14,cursor:"pointer",textAlign:"left",marginBottom:6}},r))
    )
  ):null;

  // Date nav
  const dateNav=h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}},
    h("button",{onClick:()=>setSelDate(addDays(selDate,-1)),style:{background:"#fff",border:"1px solid #d1d5db",borderRadius:10,padding:"8px 14px",fontSize:16,cursor:"pointer"}},"\u2190"),
    h("div",{style:{textAlign:"center"}},
      h("div",{style:{fontSize:16,fontWeight:800}},DAY_LABELS[dayOfWeek(selDate)]),
      h("div",{style:{fontSize:12,color:"#64748b"}},selDate+(selDate===todayStr()?" (Today)":"")),
      settings.injectionDay&&DAY_LABELS[dayOfWeek(selDate)].toLowerCase()===settings.injectionDay?h("span",{style:{fontSize:10,background:"#fef3c7",color:"#92400e",padding:"1px 8px",borderRadius:8,fontWeight:600}},"\u{1F489} Injection Day"):null
    ),
    h("button",{onClick:()=>setSelDate(addDays(selDate,1)),style:{background:"#fff",border:"1px solid #d1d5db",borderRadius:10,padding:"8px 14px",fontSize:16,cursor:"pointer"}},"\u2192")
  );

  // Stats bar
  const statsData=[
    {l:"Eaten",v:totalCal,u:"kcal",c:totalCal>calT?"#dc2626":"#059669",bg:totalCal>calT?"#fef2f2":"#ecfdf5"},
    {l:"Burned",v:"-"+woBurn,u:"kcal",c:"#f59e0b",bg:"#fffbeb"},
    {l:"Net",v:totalCal-woBurn,u:"kcal",c:"#2563eb",bg:"#eff6ff"},
    {l:"Protein",v:totalP,u:"g",c:"#7c3aed",bg:"#f5f3ff"}
  ];
  const stats=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:12}},
    ...statsData.map((s,i)=>h("div",{key:i,style:{background:s.bg,borderRadius:10,padding:"8px 4px",textAlign:"center"}},
      h("div",{style:{fontSize:9,color:"#64748b",fontWeight:600}},s.l),
      h("div",{style:{fontSize:17,fontWeight:800,color:s.c}},s.v),
      h("div",{style:{fontSize:9,color:"#94a3b8"}},s.u)
    ))
  );

  // Calorie bar
  const calBar=h("div",{style:{background:"#fff",borderRadius:10,padding:"10px 12px",marginBottom:12}},
    h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},
      h("span",{style:{fontSize:11,fontWeight:600}},"Calories"),
      h("span",{style:{fontSize:11,fontWeight:700,color:totalCal>calT?"#dc2626":"#059669"}},totalCal+"/"+calT)
    ),
    h("div",{style:{background:"#f1f5f9",borderRadius:6,height:10,overflow:"hidden"}},
      h("div",{style:{width:Math.min((totalCal/calT)*100,100)+"%",height:"100%",borderRadius:6,background:totalCal>calT?"#ef4444":totalCal>calT*0.9?"#f59e0b":"#22c55e",transition:"width 0.3s"}})
    )
  );

  // Levo card
  const levo=h("div",{style:{background:"#fff",borderRadius:12,padding:"10px 14px",marginBottom:6,display:"flex",alignItems:"center",gap:10,border:"1px solid #e2e8f0"}},
    h("span",{style:{fontSize:20}},"\u{1F48A}"),
    h("div",{style:{flex:1}},
      h("div",{style:{fontSize:12,fontWeight:700}},"Levothyroxine - "+parseTime(settings.levoTime||"6:30 AM")),
      h("div",{style:{fontSize:11,color:"#64748b"}},"Empty stomach + warm water. No food/coffee 60 min.")
    )
  );

  // Meal cards
