<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 240 240">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2C6975"/><stop offset="100%" stop-color="#1A4F5A"/></linearGradient>
<linearGradient id="ro" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#26C6DA"/><stop offset="100%" stop-color="#3C8CFC"/></linearGradient>
<linearGradient id="ri" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#50C878"/><stop offset="100%" stop-color="#2E8B57"/></linearGradient>
<linearGradient id="yg" x1="0.5" y1="0" x2="0.5" y2="1"><stop offset="0%" stop-color="#26C6DA"/><stop offset="45%" stop-color="#D4A853"/><stop offset="100%" stop-color="#50C878"/></linearGradient>
</defs>
<!-- Background rounded square -->
<rect x="12" y="12" width="216" height="216" rx="48" fill="url(#bg)"/>
<!-- 8 compass arrows -->
<g transform="translate(120,20)"><polygon points="0,-6 -5,4 -2,2 0,8 2,2 5,4" fill="#26C6DA" opacity="0.85"/></g>
<g transform="translate(120,210)"><polygon points="0,6 -4,-3 -2,-1 0,-7 2,-1 4,-3" fill="rgba(255,255,255,0.2)"/></g>
<g transform="translate(215,115)"><polygon points="6,0 -3,-4.5 -1,-2 -7,0 -1,2 -3,4.5" fill="rgba(255,255,255,0.2)"/></g>
<g transform="translate(25,115)"><polygon points="-6,0 3,-4.5 1,-2 7,0 1,2 3,4.5" fill="rgba(255,255,255,0.2)"/></g>
<g transform="translate(178,52) rotate(45)"><polygon points="0,-4 -2.5,2 0,0 2.5,2" fill="rgba(255,255,255,0.1)"/></g>
<g transform="translate(62,52) rotate(-45)"><polygon points="0,-4 -2.5,2 0,0 2.5,2" fill="rgba(255,255,255,0.1)"/></g>
<g transform="translate(178,178) rotate(135)"><polygon points="0,-4 -2.5,2 0,0 2.5,2" fill="rgba(255,255,255,0.1)"/></g>
<g transform="translate(62,178) rotate(-135)"><polygon points="0,-4 -2.5,2 0,0 2.5,2" fill="rgba(255,255,255,0.1)"/></g>
<!-- 12 lotus petals -->
<g opacity="0.14" fill="none" stroke="#D4A853" stroke-width="0.7">
<ellipse cx="120" cy="40" rx="8" ry="5" transform="rotate(0,120,115)"/>
<ellipse cx="120" cy="40" rx="8" ry="5" transform="rotate(30,120,115)"/>
<ellipse cx="120" cy="40" rx="8" ry="5" transform="rotate(60,120,115)"/>
<ellipse cx="120" cy="40" rx="8" ry="5" transform="rotate(90,120,115)"/>
<ellipse cx="120" cy="40" rx="8" ry="5" transform="rotate(120,120,115)"/>
<ellipse cx="120" cy="40" rx="8" ry="5" transform="rotate(150,120,115)"/>
<ellipse cx="120" cy="40" rx="8" ry="5" transform="rotate(180,120,115)"/>
<ellipse cx="120" cy="40" rx="8" ry="5" transform="rotate(210,120,115)"/>
<ellipse cx="120" cy="40" rx="8" ry="5" transform="rotate(240,120,115)"/>
<ellipse cx="120" cy="40" rx="8" ry="5" transform="rotate(270,120,115)"/>
<ellipse cx="120" cy="40" rx="8" ry="5" transform="rotate(300,120,115)"/>
<ellipse cx="120" cy="40" rx="8" ry="5" transform="rotate(330,120,115)"/>
</g>
<!-- Outer fitness ring -->
<circle cx="120" cy="115" r="72" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="8"/>
<circle cx="120" cy="115" r="72" fill="none" stroke="url(#ro)" stroke-width="8" stroke-dasharray="365 90" stroke-linecap="round" transform="rotate(-130,120,115)"/>
<!-- Inner nutrition ring -->
<circle cx="120" cy="115" r="54" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="6"/>
<circle cx="120" cy="115" r="54" fill="none" stroke="url(#ri)" stroke-width="6" stroke-dasharray="270 70" stroke-linecap="round" transform="rotate(-90,120,115)"/>
<!-- Sri Yantra triangles — tri-gradient -->
<g stroke="url(#yg)" fill="none">
<polygon points="120,68 84,138 156,138" stroke-width="1.8" opacity="0.8"/>
<polygon points="120,76 92,132 148,132" stroke-width="1.2" opacity="0.6"/>
<polygon points="120,84 100,126 140,126" stroke-width="0.8" opacity="0.4"/>
<polygon points="120,162 84,92 156,92" stroke-width="1.8" opacity="0.8"/>
<polygon points="120,154 92,98 148,98" stroke-width="1.2" opacity="0.6"/>
<polygon points="120,146 100,104 140,104" stroke-width="0.8" opacity="0.4"/>
</g>
<!-- Vertex circles -->
<circle cx="120" cy="68" r="1.8" fill="none" stroke="#26C6DA" stroke-width="0.5" opacity="0.5"/>
<circle cx="84" cy="138" r="1.8" fill="none" stroke="#D4A853" stroke-width="0.5" opacity="0.5"/>
<circle cx="156" cy="138" r="1.8" fill="none" stroke="#D4A853" stroke-width="0.5" opacity="0.5"/>
<circle cx="120" cy="162" r="1.8" fill="none" stroke="#50C878" stroke-width="0.5" opacity="0.5"/>
<circle cx="84" cy="92" r="1.8" fill="none" stroke="#50C878" stroke-width="0.5" opacity="0.5"/>
<circle cx="156" cy="92" r="1.8" fill="none" stroke="#50C878" stroke-width="0.5" opacity="0.5"/>
<!-- Bindu with NW -->
<circle cx="120" cy="115" r="16" fill="rgba(255,255,255,0.06)" stroke="#D4A853" stroke-width="0.8" opacity="0.7"/>
<text x="120" y="120" text-anchor="middle" font-family="-apple-system,SF Pro Display,Helvetica,Arial,sans-serif" font-size="14" font-weight="700" fill="rgba(255,255,255,0.7)" letter-spacing="0.5">NW</text>
<!-- Bottom text -->
<text x="120" y="205" text-anchor="middle" font-family="-apple-system,SF Pro Display,Helvetica,Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.45)" letter-spacing="3">NAV.WINS</text>
</svg>
