<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 260 260">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2C6975"/><stop offset="100%" stop-color="#1A4F5A"/></linearGradient>
<linearGradient id="sl" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7B8FE8"/><stop offset="100%" stop-color="#4A5CB8"/></linearGradient>
<linearGradient id="nu" x1="0" y1="1" x2="1" y2="0"><stop offset="0%" stop-color="#2E8B57"/><stop offset="100%" stop-color="#50C878"/></linearGradient>
<linearGradient id="yg" x1="0.5" y1="0" x2="0.5" y2="1"><stop offset="0%" stop-color="#7B8FE8"/><stop offset="45%" stop-color="#D4A853"/><stop offset="100%" stop-color="#50C878"/></linearGradient>
</defs>
<!-- Background -->
<rect x="22" y="22" width="216" height="216" rx="48" fill="url(#bg)"/>
<!-- 8-point compass -->
<g transform="translate(130,30)"><polygon points="0,-6 -5,4 -2,2 0,8 2,2 5,4" fill="rgba(255,255,255,0.45)"/></g>
<g transform="translate(130,230)"><polygon points="0,6 -4,-3 -2,-1 0,-7 2,-1 4,-3" fill="rgba(255,255,255,0.18)"/></g>
<g transform="translate(230,130)"><polygon points="6,0 -3,-4.5 -1,-2 -7,0 -1,2 -3,4.5" fill="rgba(255,255,255,0.18)"/></g>
<g transform="translate(30,130)"><polygon points="-6,0 3,-4.5 1,-2 7,0 1,2 3,4.5" fill="rgba(255,255,255,0.18)"/></g>
<g transform="translate(197,58) rotate(45)"><polygon points="0,-3.5 -2,1.5 0,0 2,1.5" fill="rgba(255,255,255,0.08)"/></g>
<g transform="translate(63,58) rotate(-45)"><polygon points="0,-3.5 -2,1.5 0,0 2,1.5" fill="rgba(255,255,255,0.08)"/></g>
<g transform="translate(197,202) rotate(135)"><polygon points="0,-3.5 -2,1.5 0,0 2,1.5" fill="rgba(255,255,255,0.08)"/></g>
<g transform="translate(63,202) rotate(-135)"><polygon points="0,-3.5 -2,1.5 0,0 2,1.5" fill="rgba(255,255,255,0.08)"/></g>
<!-- Clock ticks -->
<g stroke="rgba(255,255,255,0.25)" stroke-width="1.2" stroke-linecap="round">
<line x1="130" y1="48" x2="130" y2="55"/><line x1="212" y1="130" x2="205" y2="130"/>
<line x1="130" y1="212" x2="130" y2="205"/><line x1="48" y1="130" x2="55" y2="130"/>
</g>
<g stroke="rgba(255,255,255,0.1)" stroke-width="0.7" stroke-linecap="round">
<line x1="188" y1="72" x2="183" y2="77"/><line x1="188" y1="188" x2="183" y2="183"/>
<line x1="72" y1="188" x2="77" y2="183"/><line x1="72" y1="72" x2="77" y2="77"/>
</g>
<text x="130" y="43" text-anchor="middle" font-family="-apple-system,Helvetica,Arial,sans-serif" font-size="7.5" fill="rgba(255,255,255,0.4)" font-weight="500">12AM</text>
<text x="220" y="132" text-anchor="start" font-family="-apple-system,Helvetica,Arial,sans-serif" font-size="7.5" fill="rgba(255,255,255,0.4)" font-weight="500">6AM</text>
<text x="130" y="221" text-anchor="middle" font-family="-apple-system,Helvetica,Arial,sans-serif" font-size="7.5" fill="rgba(255,255,255,0.4)" font-weight="500">12PM</text>
<text x="40" y="132" text-anchor="end" font-family="-apple-system,Helvetica,Arial,sans-serif" font-size="7.5" fill="rgba(255,255,255,0.4)" font-weight="500">6PM</text>
<!-- 12 lotus petals -->
<g opacity="0.12" fill="none" stroke="#D4A853" stroke-width="0.6">
<ellipse cx="130" cy="55" rx="7" ry="4.5" transform="rotate(0,130,130)"/><ellipse cx="130" cy="55" rx="7" ry="4.5" transform="rotate(30,130,130)"/>
<ellipse cx="130" cy="55" rx="7" ry="4.5" transform="rotate(60,130,130)"/><ellipse cx="130" cy="55" rx="7" ry="4.5" transform="rotate(90,130,130)"/>
<ellipse cx="130" cy="55" rx="7" ry="4.5" transform="rotate(120,130,130)"/><ellipse cx="130" cy="55" rx="7" ry="4.5" transform="rotate(150,130,130)"/>
<ellipse cx="130" cy="55" rx="7" ry="4.5" transform="rotate(180,130,130)"/><ellipse cx="130" cy="55" rx="7" ry="4.5" transform="rotate(210,130,130)"/>
<ellipse cx="130" cy="55" rx="7" ry="4.5" transform="rotate(240,130,130)"/><ellipse cx="130" cy="55" rx="7" ry="4.5" transform="rotate(270,130,130)"/>
<ellipse cx="130" cy="55" rx="7" ry="4.5" transform="rotate(300,130,130)"/><ellipse cx="130" cy="55" rx="7" ry="4.5" transform="rotate(330,130,130)"/>
</g>
<!-- OUTER: Sleep 10PM-6AM (120deg = 150.8 of 452.4 circumference) -->
<circle cx="130" cy="130" r="72" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="8"/>
<circle cx="130" cy="130" r="72" fill="none" stroke="url(#sl)" stroke-width="8" stroke-dasharray="150.8 301.6" stroke-linecap="round" transform="rotate(240,130,130)"/>
<!-- Moon at ~2AM -->
<g transform="translate(168,60)"><path d="M0,-6 A6,6 0 1,1 0,6 A4.5,4.5 0 0,0 0,-6Z" fill="rgba(255,255,255,0.35)"/></g>
<!-- INNER: Nutrition 7:30AM-8:30PM (195deg = 183.8 of 339.3 circumference) -->
<circle cx="130" cy="130" r="54" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="6"/>
<circle cx="130" cy="130" r="54" fill="none" stroke="url(#nu)" stroke-width="6" stroke-dasharray="183.8 155.5" stroke-linecap="round" transform="rotate(22.5,130,130)"/>
<!-- Sun at ~2PM -->
<g transform="translate(130,196)">
<circle cx="0" cy="0" r="4" fill="rgba(255,255,255,0.3)"/>
<g stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-linecap="round">
<line x1="0" y1="-7.5" x2="0" y2="-6"/><line x1="0" y1="6" x2="0" y2="7.5"/>
<line x1="-7.5" y1="0" x2="-6" y2="0"/><line x1="6" y1="0" x2="7.5" y2="0"/>
<line x1="-5.3" y1="-5.3" x2="-4.2" y2="-4.2"/><line x1="4.2" y1="4.2" x2="5.3" y2="5.3"/>
<line x1="5.3" y1="-5.3" x2="4.2" y2="-4.2"/><line x1="-4.2" y1="4.2" x2="-5.3" y2="5.3"/>
</g>
</g>
<!-- Sri Yantra triangles -->
<g stroke="url(#yg)" fill="none">
<polygon points="130,83 94,153 166,153" stroke-width="1.6" opacity="0.75"/>
<polygon points="130,91 102,147 158,147" stroke-width="1.0" opacity="0.55"/>
<polygon points="130,177 94,107 166,107" stroke-width="1.6" opacity="0.75"/>
<polygon points="130,169 102,113 158,113" stroke-width="1.0" opacity="0.55"/>
</g>
<!-- Vertex circles -->
<circle cx="130" cy="83" r="1.5" fill="none" stroke="#7B8FE8" stroke-width="0.5" opacity="0.5"/>
<circle cx="94" cy="153" r="1.5" fill="none" stroke="#D4A853" stroke-width="0.5" opacity="0.5"/>
<circle cx="166" cy="153" r="1.5" fill="none" stroke="#D4A853" stroke-width="0.5" opacity="0.5"/>
<circle cx="130" cy="177" r="1.5" fill="none" stroke="#50C878" stroke-width="0.5" opacity="0.5"/>
<circle cx="94" cy="107" r="1.5" fill="none" stroke="#50C878" stroke-width="0.5" opacity="0.5"/>
<circle cx="166" cy="107" r="1.5" fill="none" stroke="#50C878" stroke-width="0.5" opacity="0.5"/>
<!-- Bindu with NW -->
<circle cx="130" cy="130" r="16" fill="rgba(255,255,255,0.06)" stroke="#D4A853" stroke-width="0.8" opacity="0.7"/>
<text x="130" y="135" text-anchor="middle" font-family="-apple-system,Helvetica,Arial,sans-serif" font-size="14" font-weight="700" fill="rgba(255,255,255,0.7)" letter-spacing="0.5">NW</text>
</svg>
